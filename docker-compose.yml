services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shipiq-backend
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - shipiq-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shipiq-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - shipiq-network

networks:
  shipiq-network:
    driver: bridge
